<svg width="1440" height="900" viewBox="0 0 1440 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1440" height="900" fill="#0A0F14"/>
  <rect x="56" y="44" width="1328" height="812" rx="34" fill="#121925" stroke="#2C3951" stroke-width="2"/>
  <text x="104" y="126" fill="#8FD5FF" font-family="Segoe UI, Arial, sans-serif" font-size="20" letter-spacing="8">SCENARIO PLANNING ATLAS</text>
  <text x="104" y="220" fill="#F2EAD8" font-family="Georgia, serif" font-size="62" font-weight="700">
    <tspan x="104" dy="0">Three possible futures.</tspan>
    <tspan x="104" dy="68">One cleaner way to decide.</tspan>
  </text>
  <text x="104" y="336" fill="#BCC6D7" font-family="Segoe UI, Arial, sans-serif" font-size="26">
    <tspan x="104" dy="0">A strategy canvas for downside, base-case, and upside planning</tspan>
    <tspan x="104" dy="34">across revenue, growth, AI, operations, and governance pressure.</tspan>
  </text>
  <rect x="104" y="426" width="286" height="170" rx="22" fill="#1A2434" stroke="#314462"/>
  <rect x="412" y="426" width="286" height="170" rx="22" fill="#1A2434" stroke="#314462"/>
  <rect x="720" y="426" width="286" height="170" rx="22" fill="#1A2434" stroke="#314462"/>
  <rect x="1028" y="426" width="286" height="170" rx="22" fill="#1A2434" stroke="#314462"/>
  <text x="134" y="474" fill="#9FB0C4" font-family="Segoe UI, Arial, sans-serif" font-size="16">MODELED BRANCHES</text>
  <text x="134" y="542" fill="#F2EAD8" font-family="Georgia, serif" font-size="52" font-weight="700">3</text>
  <text x="134" y="574" fill="#FFFFFF" font-family="Segoe UI, Arial, sans-serif" font-size="19">
    <tspan x="134" dy="0">Downside, base, and</tspan>
    <tspan x="134" dy="26">upside paths</tspan>
  </text>
  <text x="442" y="474" fill="#9FB0C4" font-family="Segoe UI, Arial, sans-serif" font-size="16">DECISION LEVERS</text>
  <text x="442" y="542" fill="#F2EAD8" font-family="Georgia, serif" font-size="52" font-weight="700">11</text>
  <text x="442" y="574" fill="#FFFFFF" font-family="Segoe UI, Arial, sans-serif" font-size="19">
    <tspan x="442" dy="0">Commercial, hiring, AI,</tspan>
    <tspan x="442" dy="26">and governance moves</tspan>
  </text>
  <text x="750" y="474" fill="#9FB0C4" font-family="Segoe UI, Arial, sans-serif" font-size="16">EXPOSURE HEAT</text>
  <text x="750" y="542" fill="#F2EAD8" font-family="Georgia, serif" font-size="52" font-weight="700">$4.1M</text>
  <text x="750" y="574" fill="#FFFFFF" font-family="Segoe UI, Arial, sans-serif" font-size="19">
    <tspan x="750" dy="0">Revenue and retention</tspan>
    <tspan x="750" dy="26">surface at risk</tspan>
  </text>
  <text x="1058" y="474" fill="#9FB0C4" font-family="Segoe UI, Arial, sans-serif" font-size="16">MOVE URGENCY</text>
  <text x="1058" y="542" fill="#F2EAD8" font-family="Georgia, serif" font-size="52" font-weight="700">9</text>
  <text x="1058" y="574" fill="#FFFFFF" font-family="Segoe UI, Arial, sans-serif" font-size="19">
    <tspan x="1058" dy="0">Actions needing owner</tspan>
    <tspan x="1058" dy="26">commitment this week</tspan>
  </text>
  <rect x="104" y="640" width="1210" height="162" rx="22" fill="#172130" stroke="#30435F"/>
  <text x="136" y="694" fill="#F7D783" font-family="Segoe UI, Arial, sans-serif" font-size="20" letter-spacing="6">BASE CASE</text>
  <text x="136" y="748" fill="#F2EAD8" font-family="Georgia, serif" font-size="38" font-weight="700">
    <tspan x="136" dy="0">Promote the controlled plan now,</tspan>
    <tspan x="136" dy="42">clear two blockers, then reopen the upside branch.</tspan>
  </text>
  <text x="136" y="808" fill="#BCC6D7" font-family="Segoe UI, Arial, sans-serif" font-size="21">A cleaner decision surface for strategy teams that need more than spreadsheet drift.</text>
